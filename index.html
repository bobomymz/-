<script>
/**
 * ------------------------------------------------------------------
 * 1. 基础工具类与柏林噪声实现 (Perlin Noise)
 * ------------------------------------------------------------------
 */
const Permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
const p = new Array(512);
for (let i=0; i < 256 ; i++) p[256+i] = p[i] = Permutation[i];

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(t, a, b) { return a + t * (b - a); }
function grad(hash, x, y, z) {
    const h = hash & 15;
    const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : z;
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}

// 简化版 2D Perlin
function perlin(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fade(x), v = fade(y);
    const A = p[X]+Y, AA = p[A]+0, AB = p[A+1]+0, B = p[X+1]+Y, BA = p[B]+0, BB = p[B+1]+0;
    return lerp(v, lerp(u, grad(p[AA], x, y, 0), grad(p[BA], x-1, y, 0)),
               lerp(u, grad(p[AB], x, y-1, 0), grad(p[BB], x-1, y-1, 0)));
}

/**

function generateDistinctColors(count) {
    const colors = [];
    for (let i = 0; i < count; i++) {
        const hue = (i * 360) / count;
        colors.push(`hsl(${hue}, 80%, 55%)`);
    }
    return colors.sort(() => Math.random() - 0.5);
}

function randomRange(min, max) {
    return min + Math.random() * (max - min);
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getFactionName(factionId) {
    if (factionId <= 0) return '中立';
    return factions[factionId - 1]?.name || `阵营${factionId}`;
}

function getFactionDisplayName(factionId) {
    if (factionId <= 0) return '中立';
    return `${getFactionName(factionId)}（${factionId}）`;
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function getColorWithAlpha(color, alpha) {
    if (!color) return `rgba(255, 255, 255, ${alpha})`;
    if (color.startsWith('hsl(')) return color.replace('hsl(', 'hsla(').replace(')', `, ${alpha})`);
    if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', `, ${alpha})`);
    if (color.startsWith('#')) {
        const hex = color.slice(1);
        if (hex.length === 6) {
            const r = parseInt(hex.slice(0, 2), 16);
            const g = parseInt(hex.slice(2, 4), 16);
            const b = parseInt(hex.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
    }
    return color;
}

function normalizeLabelAngle(theta) {
    while (theta > Math.PI / 2) theta -= Math.PI;
    while (theta < -Math.PI / 2) theta += Math.PI;
    return theta;
}

function getAreaPrincipalAxis(cells, centerX, centerY, width, height) {
    const fallbackSpan = Math.max(width, height, 1);
    if (!Array.isArray(cells) || cells.length < LABEL_MIN_CELLS_FOR_PCA) {
        return { theta: 0, span: fallbackSpan };
    }

    let covXX = 0;
    let covYY = 0;
    let covXY = 0;
    for (const cell of cells) {
        const dx = cell.x + 0.5 - centerX;
        const dy = cell.y + 0.5 - centerY;
        covXX += dx * dx;
        covYY += dy * dy;
        covXY += dx * dy;
    }
    covXX /= cells.length;
    covYY /= cells.length;
    covXY /= cells.length;

    const trace = covXX + covYY;
    const determinant = covXX * covYY - covXY * covXY;
    const discriminant = Math.max(0, trace * trace - 4 * determinant);
    const sqrtDiscriminant = Math.sqrt(discriminant);
    const eigenvalue1 = (trace + sqrtDiscriminant) / 2;
    const eigenvalue2 = (trace - sqrtDiscriminant) / 2;
    const principalValue = Math.max(eigenvalue1, eigenvalue2);

    if (Math.abs(eigenvalue1 - eigenvalue2) < 1e-4) {
        return { theta: 0, span: fallbackSpan };
    }

    let vx = covXY;
    let vy = principalValue - covXX;
    if (Math.abs(vx) + Math.abs(vy) < 1e-6) {
        vx = principalValue - covYY;
        vy = covXY;
    }
    const length = Math.hypot(vx, vy);
    if (length < 1e-6) {
        return { theta: 0, span: fallbackSpan };
    }

    vx /= length;
    vy /= length;

    let minProj = Infinity;
    let maxProj = -Infinity;
    for (const cell of cells) {
        const dx = cell.x + 0.5 - centerX;
        const dy = cell.y + 0.5 - centerY;
        const projection = dx * vx + dy * vy;
        if (projection < minProj) minProj = projection;
        if (projection > maxProj) maxProj = projection;
    }

    return {
        theta: normalizeLabelAngle(Math.atan2(vy, vx)),
        span: Math.max(maxProj - minProj, fallbackSpan)
    };
}

function getSettlementPopCap(settlement) { // 计算城市人口上限
    return 10 * Math.log(1 + Math.max(0, settlement.resource)) + 1;
}

function getInitialHealth(settlement) {
    const baseHealth = 70;
    const healthPerTech = 30;
    const techLevel = Math.max(1, Math.floor(settlement?.techLevel || 1));
    return baseHealth + (techLevel - 1) * healthPerTech;
}

function findSettlementAt(x, y) {
    if (!Array.isArray(settlementMap) || !settlementMap[x]) return null;
    return settlementMap[x][y];
}

function getActiveSettlement(settlement) {
    if (!settlement || settlement.isDestroyed) return null;
    if (!Array.isArray(settlementMap) || !settlementMap[settlement.x]) return null;
    return settlementMap[settlement.x][settlement.y] === settlement ? settlement : null;
}

function destroySettlement(settlement) {
    const activeSettlement = getActiveSettlement(settlement);
    if (!activeSettlement) return false;
    if (settlementMap[activeSettlement.x]) settlementMap[activeSettlement.x][activeSettlement.y] = null;
    if (ferryMap[activeSettlement.x]) ferryMap[activeSettlement.x][activeSettlement.y] = 0;
    activeSettlement.isDestroyed = true;
    const index = settlements.indexOf(activeSettlement);
    if (index >= 0) settlements.splice(index, 1);
    if (hoveredSettlement === activeSettlement) hideSettlementTooltip();
    return true;
}

function findUnitAt(x, y) {
    let best = null;
    for (const u of units) {
        if (u.x === x && u.y === y && !u.isDead) {
            if (!best || u.health > best.health) best = u;
        }
    }
    return best;
}

function updateSettlementTooltipPosition(screenX, screenY) {
    const tooltip = document.getElementById('settlementTooltip');
    if (!tooltip) return;
    tooltip.style.left = `${screenX + 14}px`;
    tooltip.style.top = `${screenY + 14}px`;
}

function updateUnitTooltipPosition(screenX, screenY) {
    const tooltip = document.getElementById('unitTooltip');
    if (!tooltip) return;
    tooltip.style.left = `${screenX + 14}px`;
    tooltip.style.top = `${screenY + 104}px`;
}

function renderSettlementTooltip(settlement) {
    const tooltip = document.getElementById('settlementTooltip');
    settlement = getActiveSettlement(settlement);
    if (!tooltip || !settlement) {
        if (tooltip) tooltip.style.display = 'none';
        return;
    }
    const popCap = getSettlementPopCap(settlement);
    const factionLabel = getFactionDisplayName(settlement.faction);
    tooltip.innerHTML = [
        `<strong>${factionLabel} 定居点</strong>`,
        `资源: ${settlement.resource.toFixed(1)}`,
        `预约资源: ${settlement.reservedResource.toFixed(1)}`,
        `人口: ${settlement.population.toFixed(1)} / ${popCap.toFixed(1)}`,
        `科技: ${settlement.techLevel}`,
        `适宜度: ${settlement.score.toFixed(1)}`
    ].join('<br>');
    tooltip.style.display = 'block';
    updateSettlementTooltipPosition(hoveredSettlementScreenX, hoveredSettlementScreenY);
}

function hideSettlementTooltip() {
    hoveredSettlement = null;
    const tooltip = document.getElementById('settlementTooltip');
    if (tooltip) tooltip.style.display = 'none';
}

function renderUnitTooltip(unit) {
    const tooltip = document.getElementById('unitTooltip');
    if (!tooltip || !unit || unit.isDead || !units.includes(unit)) {
        if (tooltip) tooltip.style.display = 'none';
        return;
    }
    const birthSettlement = getActiveSettlement(unit.birthSettlement);
    const maxHealth = birthSettlement ? getInitialHealth(birthSettlement) : unit.health;
    tooltip.innerHTML = [
        `<strong>${getFactionDisplayName(unit.faction)} 单位</strong>`,
        `生命: ${unit.health.toFixed(1)} / ${maxHealth.toFixed(1)}`,

        `占领格数: ${unit.capturedTiles}`,
        `出生地: ${birthSettlement ? `${birthSettlement.x}, ${birthSettlement.y}` : '无'}`
    ].join('<br>');
    tooltip.style.display = 'block';
    updateUnitTooltipPosition(hoveredSettlementScreenX, hoveredSettlementScreenY);
}

function hideUnitTooltip() {
    hoveredUnit = null;
    const tooltip = document.getElementById('unitTooltip');
    if (tooltip) tooltip.style.display = 'none';
}

function setupSettlementHoverPanel() {
    const canvas = document.getElementById('mapCanvas');
    if (!canvas || canvas.dataset.settlementHoverBound === '1') return;
    canvas.dataset.settlementHoverBound = '1';
    canvas.addEventListener('mousemove', (event) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((event.clientX - rect.left) / SCALE_FACTOR);
        const y = Math.floor((event.clientY - rect.top) / SCALE_FACTOR);
        hoveredSettlementScreenX = event.clientX;
        hoveredSettlementScreenY = event.clientY;
        const settlement = x >= 0 && x < SIZE && y >= 0 && y < SIZE ? findSettlementAt(x, y) : null;
        hoveredSettlement = settlement;
        hoveredUnit = x >= 0 && x < SIZE && y >= 0 && y < SIZE ? findUnitAt(x, y) : null;
        if (settlement) renderSettlementTooltip(settlement);
        else hideSettlementTooltip();
        if (hoveredUnit) renderUnitTooltip(hoveredUnit);
        else hideUnitTooltip();
    });
    canvas.addEventListener('mouseleave', () => {
        hideSettlementTooltip();
        hideUnitTooltip();
    });
}

/**
 * ------------------------------------------------------------------
 * 3. 噪声生成算法
 * ------------------------------------------------------------------
 */
// 基础地形：标准 Perlin
function getBaseTerrain(x, y, seed, scale = 0.03) {
    // 缩放系数：越小地形越平缓
    return perlin(x * scale + seed, y * scale + seed);
}

// 山脊：FBM (分形布朗运动) + 绝对值处理
function getRidgeNoise(x, y, seed) {
    let value = 0;
    let amplitude = 1;
    let frequency = 0.08;
    let maxValue = 0;

    // 叠加 3 层 octaves
    for(let i=0; i<3; i++) {
        // Math.abs(perlin) * -1 创建尖锐的谷底，然后反转成为山脊
        // 这里简化：直接用 abs 产生褶皱，然后取反或归一化
        let n = perlin(x * frequency + seed, y * frequency + seed);
        value += Math.abs(n) * amplitude; 
        maxValue += amplitude;
        amplitude *= 0.5;
        frequency *= 2;
    }
    return value / maxValue; 
}

function generateWorld() {
    heightMap = [];
    riverMap = [];
    ferryMap = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    hideSettlementTooltip();
    hideUnitTooltip();
    const seed = Math.random() * 1000, seed2 = Math.random() * 1000, seed3 = Math.random() * 1000;

    // --- 步骤 1: 生成高度图 ---
    let minH = Infinity, maxH = -Infinity;

    for (let x = 0; x < SIZE; x++) {
        heightMap[x] = [];
        riverMap[x] = [];
        for (let y = 0; y < SIZE; y++) {
            let nx = x + getBaseTerrain(x,y,seed2,0.06) * 5, ny = y + getBaseTerrain(x,y,seed3,0.06) * 5;
            riverMap[x][y] = 0;

            // 1. 柏林噪声作为基础起伏
            let base = getBaseTerrain(nx, ny, seed); // -1 到 1
            base = (base + 1) / 2; // 归一化 0-1

            base *= 0.8; // 基础地形更平滑

            // 2. FBM 生成山脊细节
            let ridges = getRidgeNoise(nx, ny, seed + 500); // 0-1 (因为用了abs)
            
            // 3. 叠加：基础地形占 70%，山脊细节占 30%，且山脊只在高处显著
            // 使用幂函数让平原更平，山峰更陡
            let h = base * 0.7 + ridges * 0.3;
            
            // 增加一点指数让低地更平
            h = Math.pow(h, 1.2 - h * h);

            heightMap[x][y] = h;
            
            if (h < minH) minH = h;
            if (h > maxH) maxH = h;
        }
    }

    // 再次归一化到 0-1 方便后续计算
    for (let x = 0; x < SIZE; x++) {
        for (let y = 0; y < SIZE; y++) {
            heightMap[x][y] = (heightMap[x][y] - minH) / (maxH - minH);
        }
    }

    // --- 步骤 2: 生成河流 (A*) ---
    generateRivers();
	
    // --- 步骤 3：人烟 ---
    generateSettlements();
    // --- 步骤 4: 渲染 ---
    drawMap();
}

/**
 * ------------------------------------------------------------------
 * 4. 河流生成 (A* 算法)
 * ------------------------------------------------------------------
 */

function findMountainSource() {
    const mountainSources = [];
    const threshold = 0.5; // 只有海拔高于 0.5 的地方才考虑作为山头
    const minXY = 0;//Math.floor(SIZE / 4);
    const maxXY = SIZE;//SIZE - minXY;
    for (let x = minXY; x < maxXY; x++) {
        for (let y = minXY; y < maxXY; y++) {
            const currentH = heightMap[x][y];

            // 基础高度过滤
            if (currentH < threshold) continue;

            let isPeak = true;
            // 检查周围 3x3 邻居
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    if (dx === 0 && dy === 0) continue;
                    // 如果任何一个邻居比当前点高，它就不是山顶
                    if (x+dx>=0&&x+dx<SIZE&&y+dy>=0&&y+dy<SIZE&&heightMap[x + dx][y + dy] > currentH) {
                        isPeak = false;
                        break;
                    }
                }
                if (!isPeak) break;
            }

            if (isPeak) {
                mountainSources.push({ x:x, y:y, height: currentH });
            }
        }
    }

   // 1. 先按高度严格降序排列
    mountainSources.sort((a, b) => b.height - a.height);

    // 2. 半随机策略：
    // 我们定义前 30% 为“名山大川”的种子点。
    // 我们只打乱这前 30% 的顺序，保证大河一定从高处出，但具体哪座高山出是随机的。
    const topPercentage = 0.3;
    const topCount = Math.floor(mountainSources.length * topPercentage);
    
    // Fisher-Yates 洗牌算法仅作用于头部区间
    for (let i = topCount - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [mountainSources[i], mountainSources[j]] = [mountainSources[j], mountainSources[i]];
    }

    // 返回打乱了头部、但整体依然保留一定高度梯度的序列
    return mountainSources;
}
function findLowBasins() {
    const basins = [];
    const minXY = 0;//Math.floor(SIZE / 4);
    const maxXY = SIZE;//SIZE - minXY;

    for (let x = minXY; x < maxXY; x++) {
        for (let y = minXY; y < maxXY; y++) {
            const h = heightMap[x][y];
            if (h > 0.1) continue; // 只在低海拔地区找洼地

            let isBottom = true;
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    if (x+dx>=0&&x+dx<SIZE&&y+dy>=0&&y+dy<SIZE&&heightMap[x + dx][y + dy] < h) {
                        isBottom = false;
                        break;
                    }
                }
            }
            if (isBottom) basins.push({ x, y });
        }
    }
    return basins;
}
function generateRivers() {

    let attempts = 0;

        let startY = mountainTop[i].y;
        // 终点：地图边缘

        // 概率判定：70% 注入洼地，30% 流向边缘
        if (Math.random() < 0.7 && basins.length > 0) {

            else if (edge === 1) { endX = SIZE-1; endY = Math.floor(Math.random()*SIZE); }
            else if (edge === 2) { endX = Math.floor(Math.random()*SIZE); endY = SIZE-1; }
            else { endX = 0; endY = Math.floor(Math.random()*SIZE); }
	    type = 1;
        }

        // 执行 A*
        const path = findRiverPath(startX, startY, endX, endY);
        
        if (path && path.length > SIZE * 0.2 + type * SIZE * 0.5) {

	    path.forEach((p, i) => {
                //riverMap[p.x][p.y] = 1;

    // 获取当前点的动态半径
    const radius = getRiverWidth(i, path.length, type, p.x, p.y);
// 这里的逻辑：半径越宽，覆盖周围的概率和范围越大
    const rInt = Math.ceil(radius); 
    for (let dx = -rInt; dx <= rInt; dx++) {
        for (let dy = -rInt; dy <= rInt; dy++) {
            const nx = p.x + dx;
            const ny = p.y + dy;
            
            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                // 使用欧几里得距离来保证河道圆润
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= radius) {
                    riverMap[nx][ny] = 1;
                    // 还可以顺便降低河流中心的地形高度，模拟侵蚀
                    heightMap[nx][ny] *= 0.8; 
                }
            }
        }
    }


                // 可选：河流经过的地方稍微降低高度，形成河谷
                heightMap[p.x][p.y] *= 0.8; 
});
            riversGenerated++;
        }
    }
}
// 计算路径上某一点的河流半径
function getRiverWidth(pathIndex, pathLength, riverToEdge, x, y) {
    // 1. 进度影响：从源头到终点线性增长
    const minProgressWidth = 0.1,maxProgressWidth = 1.5 - riverToEdge * 0.5;
    const progressBase = minProgressWidth + Math.min(1, 1 - pathIndex / pathLength) * (maxProgressWidth - minProgressWidth);

    // 2. 坡度影响：计算周围 3x3 区域的最大高度差
    let maxDiff = 0, riverCount = 0;
    const currentH = heightMap[x][y];
    for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                maxDiff = Math.max(maxDiff, Math.abs(heightMap[nx][ny] - currentH));
		if(riverMap[nx][ny] === 1) riverCount ++;
            }
        }
    }

    // 坡度越大（险峻），宽度缩减系数越小
    // 如果 maxDiff 很高（如 0.2），则 widthFactor 接近 0.5
    // 如果极为平坦，widthFactor 接近 1.2
    const widthFactor = 1.2 - (maxDiff * 3.5) + riverCount * 0.05;
    
    return Math.max(0.5, progressBase * widthFactor);
}

// A* 节点结构
class Node {
    constructor(x, y, parent = null) {
        this.x = x;
        this.y = y;
        this.parent = parent;
        this.g = 0; // Cost from start
        this.h = 0; // Heuristic to end
        this.f = 0; // Total
    }
}

class MinHeap {
    constructor() {
        this.heap = [];
    }

    get size() {
        return this.heap.length;
    }

    push(node) {
        this.heap.push(node);
        this.bubbleUp(this.heap.length - 1);
    }

    pop() {
        if (this.heap.length === 0) return null;
        const top = this.heap[0];
        const last = this.heap.pop();
        if (this.heap.length > 0) {
            this.heap[0] = last;
            this.bubbleDown(0);
        }
        return top;
    }

    bubbleUp(index) {
        while (index > 0) {
            const parentIndex = Math.floor((index - 1) / 2);
            if (this.heap[index].g >= this.heap[parentIndex].g) break;
            [this.heap[index], this.heap[parentIndex]] = [this.heap[parentIndex], this.heap[index]];
            index = parentIndex;
        }
    }

    bubbleDown(index) {
        const length = this.heap.length;
        while (true) {
            let smallest = index;
            const left = index * 2 + 1;
            const right = left + 1;
            if (left < length && this.heap[left].g < this.heap[smallest].g) {
                smallest = left;
            }
            if (right < length && this.heap[right].g < this.heap[smallest].g) {
                smallest = right;
            }
            if (smallest === index) break;
            [this.heap[index], this.heap[smallest]] = [this.heap[smallest], this.heap[index]];
            index = smallest;
        }
    }
}

function findRiverPath(startX, startY, endX, endY) {
// 从start到end，但碰到边缘就中止
    let openList = [];
    let closedSet = new Set(); // 存储 "x,y" 字符串
    
    let startNode = new Node(startX, startY);
    openList.push(startNode);

    // 避免死循环的简单计数器
    let loopCount = 0;
    const maxLoops = SIZE * SIZE * 2; 

    while (openList.length > 0) {
        loopCount++;
        if (loopCount > maxLoops) return null; // 路径太长或找不到

        // 找到 f 最小的节点 (简单的线性查找，优化可用最小堆)
        let lowestIndex = 0;
        for (let i = 1; i < openList.length; i++) {
            if (openList[i].f < openList[lowestIndex].f) {
                lowestIndex = i;
            }
        }
        let current = openList[lowestIndex];

        // 到达终点？ (接近边缘即可)
        if (current.x == 0 && endX ===0 
|| current.x == SIZE - 1 && endX === SIZE - 1 
|| current.y == 0 && endY === 0 
|| current.y == SIZE - 1 && endY === SIZE - 1 
|| current.x === endX && current.y === endY) {
            let path = [];
            let temp = current;
            while (temp) {
                path.push({x: temp.x, y: temp.y});
                temp = temp.parent;
            }
            return path;
        }

        // 移出 OpenList，加入 ClosedSet
        openList.splice(lowestIndex, 1);
        closedSet.add(`${current.x},${current.y}`);

        // 邻居：上下左右
        const neighbors = [
            {x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}
        ];

        for (let offset of neighbors) {
            let nx = current.x + offset.x;
            let ny = current.y + offset.y;

            // 越界检查
            if (nx < 0 || ny < 0 || nx >= SIZE || ny >= SIZE) continue;
            
            // 已检查过
            if (closedSet.has(`${nx},${ny}`)) continue;

            // --- 核心逻辑：代价计算 ---
            // 代价 = 高度^4 + 随机噪声
            // 1. 高度惩罚：水往低处流，去高处代价极大
            let hVal = heightMap[nx][ny];
            let heightCost = Math.pow(hVal * 10, 4); // 放大并4次方，惩罚极重
            
            // 2. 随机噪声：增加 0~500 的随机代价，使河流产生随机摆动
            let randomNoise = Math.random() * 500; 
	    
	    // 3. 水流惩罚：尽量避免和其它河道重合
	    let riverCost = riverMap[nx][ny] * 5000;
            let gScore = current.g + heightCost + randomNoise ;

            // 检查该邻居是否已在 openList 中且有更好的路径
            let existingNeighbor = openList.find(n => n.x === nx && n.y === ny);
            if (existingNeighbor) {
                if (gScore < existingNeighbor.g) {
                    existingNeighbor.g = gScore;
                    existingNeighbor.parent = current;
                    existingNeighbor.f = existingNeighbor.g + existingNeighbor.h;
                }
            } else {
                let neighbor = new Node(nx, ny, current);
                neighbor.g = gScore;
                // 启发式：曼哈顿距离
                neighbor.h = (Math.abs(nx - endX) + Math.abs(ny - endY)) * 10; 
                neighbor.f = neighbor.g + neighbor.h;
                openList.push(neighbor);
            }
        }
    }
    return null;
}

function drawMap() {
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    
    // 清空
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let x = 0; x < SIZE; x++) {
        for (let y = 0; y < SIZE; y++) {
            let h = heightMap[x][y];
            let isRiver = riverMap[x][y];

            let color;
            
            if (isRiver) {
                color = "rgb(0, 120, 255)"; // 河流蓝
            } else {
                // 根据高度定色
                if (h < 0.6) {
                    // 平原绿 (根据高度渐变)
                    let g = Math.floor(Math.max(95, 100 + (h-0.35)*200));
                    color = `rgb(50, ${g}, 50)`; 
                }
                else if (h < 0.8) {
                    // 山体灰
                    let l = Math.floor(100 + (h-0.6)*300);
                    color = `rgb(${l}, ${l}, ${l})`;
                }
                else {
                    // 雪顶
                    color = "rgb(240, 240, 255)";
                }
            }

            ctx.fillStyle = color;
            ctx.fillRect(x * SCALE_FACTOR, y * SCALE_FACTOR, SCALE_FACTOR, SCALE_FACTOR);
        }
    }

    if (Array.isArray(unitOwner) && unitOwner.length === SIZE) {
        drawUnitOverlay(ctx);
    }
    if (showRoads) drawRoads(ctx);
    drawTerritoryLabels(ctx);
    // 人烟
    drawSettlements(ctx);
    if (showUnitPositions) drawUnitPositions(ctx);
    if (showParentArrows) drawParentArrows(ctx);
    if (hoveredSettlement) renderSettlementTooltip(hoveredSettlement);
    if (hoveredUnit) renderUnitTooltip(hoveredUnit);
}
/**
 * ------------------------------------------------------------------
 * 6. 定居点生成 (评分系统 + 泊松采样思想)
 * ------------------------------------------------------------------
 */
let settlements = []; // 存放 {x, y, score}

function generateSettlements() {
    settlements = [];
    settlementMap = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    settlementScores = Array.from({ length: SIZE }, () => new Float32Array(SIZE).fill(0));
    road = Array.from({ length: SIZE }, () => new Int8Array(SIZE).fill(0));
    const candidates = [];
    const MIN_DISTANCE = 4; // 泊松采样排斥半径：定居点之间至少隔4格
    // 1. 遍历地图计算每个点的“定居点适宜度”
    for (let x = 0; x < SIZE; x++) {
        for (let y = 0; y < SIZE; y++) {
            const h = heightMap[x][y];
            
            // 基础过滤：不在水里(h<0.3)，不在河道内(riverMap)，不在高山(h>0.75)
            if (h < 0.3 || h > 0.75 || riverMap[x][y] === 1) continue;

            // 计算水源亲和力 (5*5范围内是否有河流)
            let waterScore = 0;
            for (let dx = -2; dx <= 2; dx++) {
                for (let dy = -2; dy <= 2; dy++) {
                    if (x+dx>=0&&x+dx<SIZE&&y+dy>=0&&y+dy<SIZE&&riverMap[x + dx][y + dy] === 1) {
                        waterScore = 50; // 发现水源，大幅加分
                        break;
                    }
                }
            }

            // 综合评分：平原得分高 + 水源加分 - 随机扰动(增加多样性)
            const fitness = (1 - h) * 50 + waterScore + Math.random() * 10;
            settlementScores[x][y] = fitness;
            candidates.push({ x, y, score: fitness });
        }
    }

    // 2. 按分数从高到低排序 (优先占领风水宝地)
    candidates.sort((a, b) => b.score - a.score);
    const topPercentage = 0.15;
    const topCount = Math.floor(candidates.length * topPercentage);
    
    // Fisher-Yates 洗牌算法仅作用于头部区间
    for (let i = topCount - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }

    // 3. 仅为初始阵营挑选足够的定居点，不再额外生成中立点
    for (let cand of candidates) {
        if (settlements.length >= initialFactions) break;

        // 检查是否与已有的定居点太近
        let tooClose = false;
        for (let s of settlements) {
            const dist = Math.hypot(cand.x - s.x, cand.y - s.y);
            if (dist < MIN_DISTANCE) {
                tooClose = true;
                break;
            }
        }

        if (!tooClose) {
            settlements.push({// settlements有三处定义，要改一起改
                x: cand.x,
                y: cand.y,
                faction: 0,
                score: cand.score,
                resource: 100,
                reservedResource: 0, // 已预约资源
                population: 10,
                techLevel: 1,
                lastCapturer: null,
                isDestroyed: false,
                parentX: null,
                parentY: null
            });
        }
    }
    if (settlements.length < initialFactions) {
        for (const cand of candidates) {
            if (settlements.length >= initialFactions) break;
            if (settlements.some(s => s.x === cand.x && s.y === cand.y)) continue;
            settlements.push({ // settlements有三处定义，要改一起改
                x: cand.x,
                y: cand.y,
                faction: 0,
                score: cand.score,
                resource: 100,
                reservedResource: 0, // 已预约资源
                population: 10,
                techLevel: 1,
                lastCapturer: null,
                isDestroyed: false,
                parentX: null,
                parentY: null
            });
        }
    }
    for (let x = 0; x < SIZE; x++) {
        if (!ferryMap[x]) ferryMap[x] = new Int8Array(SIZE).fill(0);
        else ferryMap[x].fill(0);
    }
    for (let i = 0; i < settlements.length; i++) {
        const s = settlements[i];
        settlementMap[s.x][s.y] = s;
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        let isFerry = 0;
        for (let k = 0; k < dirs.length; k++) {
            const nx = s.x + dirs[k].x, ny = s.y + dirs[k].y;
            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && riverMap[nx][ny] === 1) { isFerry = 1; break; }
        }
        if (isFerry) ferryMap[s.x][s.y] = 1;
    }

}
// 在 drawMap() 的最后面添加
function drawRoads(ctx) {
    if (!Array.isArray(road) || road.length !== SIZE) return;
    ctx.save();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)'; // 白色
    for (let x = 0; x < SIZE; x++) {
        const row = road[x];
        if (!row) continue;
        for (let y = 0; y < SIZE; y++) {
            if (!row[y]) continue;
            const inset = SCALE_FACTOR * 0.2;
            const size = Math.max(1, SCALE_FACTOR - inset * 2);
            ctx.fillRect(x * SCALE_FACTOR + inset, y * SCALE_FACTOR + inset, size, size);
        }
    }
    ctx.restore();
}

function updateTerritoryLabels() {
    if (!Array.isArray(unitOwner) || unitOwner.length !== SIZE) {
        factionAreas = [];
        return;
    }
    const visited = Array.from({ length: SIZE }, () => new Uint8Array(SIZE));
    const groupedAreas = new Map();
    const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];

    for (let x = 0; x < SIZE; x++) {
        const row = unitOwner[x];
        if (!row) continue;
        for (let y = 0; y < SIZE; y++) {
            const fid = row[y];
            if (fid <= 0 || visited[x][y]) continue;

            const queue = [{ x, y }];
            let head = 0;
            visited[x][y] = 1;

            let area = 0;
            let sumX = 0;
            let sumY = 0;
            let minX = x;
            let maxX = x;
            let minY = y;
            let maxY = y;
            const cells = [];

            while (head < queue.length) {
                const cur = queue[head++];
                area += 1;
                sumX += cur.x + 0.5;
                sumY += cur.y + 0.5;
                cells.push({ x: cur.x, y: cur.y });
                if (cur.x < minX) minX = cur.x;
                if (cur.x > maxX) maxX = cur.x;
                if (cur.y < minY) minY = cur.y;
                if (cur.y > maxY) maxY = cur.y;

                for (const d of dirs) {
                    const nx = cur.x + d.x;
                    const ny = cur.y + d.y;
                    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
                    if (visited[nx][ny] || unitOwner[nx][ny] !== fid) continue;
                    visited[nx][ny] = 1;
                    queue.push({ x: nx, y: ny });
                }
            }

            if (area < FACTION_MIN_AREA_FOR_LABEL) continue;

            const centerX = sumX / area;
            const centerY = sumY / area;
            const width = maxX - minX;
            const height = maxY - minY;
            const principalAxis = getAreaPrincipalAxis(cells, centerX, centerY, width, height);

            const list = groupedAreas.get(fid) || [];
            list.push({
                centerX,
                centerY,
                width,
                height,
                name: getFactionName(fid),
                area,
                cells,
                theta: principalAxis.theta,
                projectionSpan: principalAxis.span
            });
            groupedAreas.set(fid, list);
        }
    }

    factionAreas = Array.from(groupedAreas.entries())
        .map(([factionId, areas]) => ({
            factionId,
            areas: areas
                .sort((a, b) => b.area - a.area)
                .slice(0, FACTION_MAX_LABELS_PER_FACTION)
        }))
        .filter(entry => entry.areas.length > 0);
}

function drawTerritoryLabels(ctx) {
    if (!Array.isArray(factionAreas) || factionAreas.length === 0) return;

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    for (const factionEntry of factionAreas) {
        const baseColor = COLORS[(factionEntry.factionId - 1) % COLORS.length];
        ctx.fillStyle = getColorWithAlpha(baseColor, FACTION_LABEL_ALPHA);
        ctx.strokeStyle = `rgba(0, 0, 0, ${FACTION_LABEL_STROKE_ALPHA})`;

        for (const area of factionEntry.areas) {
            const fontSize = clamp(
                FACTION_LABEL_BASE_FONT_SIZE + area.projectionSpan * LABEL_PROJECTION_SPAN_WEIGHT * FACTION_LABEL_FONT_SCALE / Math.max(1, area.name.length),
                FACTION_LABEL_MIN_FONT_SIZE,
                FACTION_LABEL_MAX_FONT_SIZE
            );
            ctx.font = `bold ${fontSize}px 'Trebuchet MS', 'Georgia', serif`;
            ctx.lineWidth = Math.max(2, fontSize * LABEL_STROKE_LINE_WIDTH_RATIO);
            const drawX = area.centerX * SCALE_FACTOR;
            const drawY = area.centerY * SCALE_FACTOR;
            ctx.save();
            ctx.translate(drawX, drawY);
            if (LABEL_ROTATION_ENABLED) {
                ctx.rotate(area.theta || 0);
            }
            ctx.strokeText(area.name, 0, 0);
            ctx.fillText(area.name, 0, 0);
            ctx.restore();
        }
    }

    ctx.restore();
}

function drawSettlements(ctx) {
    settlements.forEach(s => {
        let color = NEUTRAL_COLOR;
        if (s.faction > 0) color = COLORS[(s.faction - 1) % COLORS.length];
        let outlineColor = "#000";
        if (ferryMap[s.x] && ferryMap[s.x][s.y] === 1) { outlineColor = 'gold'; color = 'gold'; }
        const px = s.x * SCALE_FACTOR;
        const py = s.y * SCALE_FACTOR;
        const size = SCALE_FACTOR * 1.2;
        ctx.fillStyle = color;
        ctx.strokeStyle = outlineColor;

function drawParentArrows(ctx) {

        ctx.beginPath();

function nearestFriendlyDistance(u) {

function chooseMove(u) {
    const opts = [
        { x: u.x + 1, y: u.y },
        { x: u.x - 1, y: u.y },
        { x: u.x, y: u.y + 1 },
        { x: u.x, y: u.y - 1 }
    ];
    const rates = [];
    for (const o of opts) {
        if (o.x < 0 || o.x >= SIZE || o.y < 0 || o.y >= SIZE) { rates.push(0); continue; }
        let r = 1;
        if (riverMap[o.x][o.y] === 1) r *= 0.8;
        if (heightMap[u.x][u.y] > 0.4 && heightMap[o.x][o.y] < heightMap[u.x][u.y]) r *= 1.5;
        if (heightMap[u.x][u.y] > 0.6 && heightMap[o.x][o.y] < heightMap[u.x][u.y]) r *= 3;

        const s = findSettlementAt(o.x, o.y);
        if (s) {
            if(s.faction > 0 && s.faction === u.faction) r *= 1.2;
            else if(s.faction === 0) r *= 1.8;
        }
        else if (unitOwner[o.x][o.y] !== u.faction) r *= 1.2;
        let enemySum = 0;
        for (const v of units) {
            if (v.faction !== u.faction && Math.abs(v.x - o.x) + Math.abs(v.y - o.y) <= coverRadius(u)) enemySum += v.health;
        }
        if (enemySum > u.health * 2) r *= 0.4;
        if (Array.isArray(waveOwner) && waveOwner.length === SIZE && unitOwner[o.x][o.y] === u.faction && unitOwner[u.x][u.y] === u.faction) { // 单位靠近/远离波衰减的方向移动
            if (waveStrength[o.x][o.y] > waveStrength[u.x][u.y]) {
                // 高士气倾向于靠近
                if(u.morale > 30) r *= 10;
                else r *= 0.1;
            }
            else {
                if(u.morale > 30) r *= 0.1;
                else r *= 10;
            }
        }
        if (u.superior && !u.superior.isDead && (u.superior.morale < 30 || unitOwner[u.x][u.y] !== u.faction)) { 
            //有上级时，且上级士气低于30或我不在本阵营领地时，倾向于向上级移动
            const currentDist = Math.abs(u.x - u.superior.x) + Math.abs(u.y - u.superior.y);
            const nextDist = Math.abs(o.x - u.superior.x) + Math.abs(o.y - u.superior.y);
            if (nextDist < currentDist) r *= 20;
            else if (nextDist > currentDist) r *= 0.05;
        }
        let birthZone = getActiveSettlement(u.birthSettlement);
        if (birthZone && (u.morale < 30 || u._supplyPath === null) && unitOwner[o.x][o.y] === u.faction) {
            let dis1 = Math.abs(u.x - birthZone.x) + Math.abs(u.y - birthZone.y);
            let dis2 = Math.abs(o.x - birthZone.x) + Math.abs(o.y - birthZone.y);
            if(dis2 < dis1) r *= 20;
            else if (dis2 > dis1) r *= 0.05;
        }
        
        rates.push(r);
    }
    const sum = rates.reduce((a, b) => a + b, 0);
    if (sum <= 0) return u;
    let pick = Math.random() * sum, acc = 0;
    for (let i = 0; i < opts.length; i++) {
        acc += rates[i];
        if (pick <= acc) return opts[i];
    }
    return opts[0];
}
function coverRadius(u) { //单位覆盖地区的半径
    let r = Math.max(1, Math.floor(u.health / 15));
    // 坡度影响：计算周围 3x3 区域的最大高度差
    let maxDiff = 0, riverCount = 0, mountCount = 0;
    const currentH = heightMap[u.x][u.y];
    for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {

            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                maxDiff = Math.max(maxDiff, Math.abs(heightMap[nx][ny] - currentH));
		        if(riverMap[nx][ny] === 1) riverCount ++;
		        if(heightMap[nx][ny] > 0.6) mountCount ++;
            }
        }
    }
    // 坡度越大（险峻），涂色宽度缩减系数越小
    // 如果 maxDiff 很高（如 0.2），则 widthFactor 接近 0
    // 如果极为平坦，widthFactor 接近 1.2
   // 如果有高山/河流，涂色宽度减少
    const widthFactor = Math.max(0.1, 1.2 - (maxDiff * 3.5) - mountCount * 0.1 - riverCount * 0.05);
    
    return Math.floor(r * widthFactor);

function paintByUnit(u) {

		            else if (nx == u.x && ny == u.y) unitOwner[nx][ny] = u.faction;

}

function handleSettlementCapture(u, settlement) {
    settlement = getActiveSettlement(settlement);
    if (!settlement || settlement.faction === u.faction) return;
    const moraleRatio = Math.max(0, Math.min(1, u.morale / 100));
    const destroyChance = Math.pow(1.1 - moraleRatio, 1) * 5;
    if (Math.random() < destroyChance) {
        destroySettlement(settlement);
        return;
    }
    // 占领后清除父节点信息
    settlement.parentX = null;
    settlement.parentY = null;
    
    const current = { x: settlement.x, y: settlement.y };
    const last = u.lastCapturedSettlement;
    if (last && (last.x !== current.x || last.y !== current.y)) {
        buildRoadBetweenSettlements(last.x, last.y, current.x, current.y);
    }
    settlement.faction = u.faction;
    settlement.resource *= 0.5;
    settlement.lastCapturer = u;
    u.lastCapturedSettlement = current;
}

function roadHeuristic(x, y, endX, endY) {
    return Math.abs(x - endX) + Math.abs(y - endY);
}

function roadStepCost(x, y, nx, ny) {
    const slope = Math.abs(heightMap[nx][ny] - heightMap[x][y]);
    let cost = 1 + slope * 24;
    if (riverMap[nx][ny] === 1) cost += 18;
    if (road[nx] && road[nx][ny] === 1) cost *= 0.2;
    if (ferryMap[nx] && ferryMap[nx][ny] === 1) cost *= 0.5;
    if (findSettlementAt(nx, ny)) cost *= 0.8;
    return cost;
}

function supplyStepCost(x, y, nx, ny) {
    const slope = Math.abs(heightMap[nx][ny] - heightMap[x][y]);
    let cost = 1 + slope * 24;
    if (road[x][y] && road[nx][ny] === 1) cost *= 0.2;
    if (riverMap[nx][ny] === 1 && riverMap[x][y] === 1) cost = 0.1; // 河流到河流成本为0
    if (riverMap[nx][ny] !== riverMap[x][y] && 
        ((riverMap[nx][ny] === 0 && ferryMap[nx][ny] === 0) || (riverMap[nx][ny] === 1 && ferryMap[nx][ny] === 1))) cost = 1000; // 水运一定要走渡口上岸/下岸
    return cost;
}

function findRoadPath(startX, startY, endX, endY) {
    const openList = [];
    const openMap = new Map();
    const closedSet = new Set();
    const maxLoops = SIZE * SIZE * 4;
    const startNode = new Node(startX, startY);
    startNode.h = roadHeuristic(startX, startY, endX, endY);
    startNode.f = startNode.h;
    openList.push(startNode);
    openMap.set(`${startX},${startY}`, startNode);

    let loopCount = 0;
    while (openList.length > 0) {
        loopCount++;
        if (loopCount > maxLoops) return null;

        let lowestIndex = 0;
        for (let i = 1; i < openList.length; i++) {
            if (openList[i].f < openList[lowestIndex].f) lowestIndex = i;
        }
        const current = openList[lowestIndex];
        openList.splice(lowestIndex, 1);
        openMap.delete(`${current.x},${current.y}`);

        if (current.x === endX && current.y === endY) {
            const path = [];
            let node = current;
            while (node) {
                path.push({ x: node.x, y: node.y });
                node = node.parent;
            }
            path.reverse();
            return path;
        }

        closedSet.add(`${current.x},${current.y}`);
        const neighbors = [
            { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }
        ];
        for (const offset of neighbors) {
            const nx = current.x + offset.x;
            const ny = current.y + offset.y;
            if (nx < 0 || ny < 0 || nx >= SIZE || ny >= SIZE) continue;
            const key = `${nx},${ny}`;
            if (closedSet.has(key) || unitOwner[nx][ny] !== unitOwner[current.x][current.y]) continue;// 阵营需保持一致

            const gScore = current.g + roadStepCost(current.x, current.y, nx, ny);
            let neighbor = openMap.get(key);
            if (!neighbor) {
                neighbor = new Node(nx, ny, current);
                neighbor.g = gScore;
                neighbor.h = roadHeuristic(nx, ny, endX, endY);
                neighbor.f = neighbor.g + neighbor.h;
                openList.push(neighbor);
                openMap.set(key, neighbor);
            } else if (gScore < neighbor.g) {
                neighbor.g = gScore;
                neighbor.parent = current;
                neighbor.f = neighbor.g + neighbor.h;
            }
        }
    }
    return null;
}

function buildRoadBetweenSettlements(startX, startY, endX, endY) {
    const manhattan = Math.abs(startX - endX) + Math.abs(startY - endY);
    if (manhattan <= 0) return;
    const path = findRoadPath(startX, startY, endX, endY);
    if (!path || path.length - 1 > manhattan * 2) return;
    for (const p of path) {
        road[p.x][p.y] = 1;
    }
    if(startX === endX && startY === endY) return;
    const settlement = findSettlementAt(endX, endY);
    if(settlement) { // 确定定居点父节点
        settlement.parentX = startX;
        settlement.parentY = startY;
    }
}

function requestSupply(u) {
    const birthZone = getActiveSettlement(u.birthSettlement);

    u._supplyTimer -- ; // 计时器
    if (u._supplyTimer <= 0) { // 冷却时间到, 重新计算路径
        u._supplyTimer = u._supplyCooldown;

        if (u.x < 0 || u.x >= SIZE || u.y < 0 || u.y >= SIZE || unitOwner[u.x][u.y] !== u.faction) { // 超出边界或不在领土内
            u._supplyPath = null;
            u.supplyCost = 0;
            u.supplySettlement = null;
        } else { // 计算路径
            const heap = new MinHeap();
            const costSoFar = Array.from({ length: SIZE }, () => new Float64Array(SIZE).fill(Infinity));
            const parent = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
            const neighbors = [
                { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }
            ];
            let foundPath = false;

            heap.push({ x: u.x, y: u.y, g: 0 });
            costSoFar[u.x][u.y] = 0;

            while (heap.size > 0) {
                const current = heap.pop(); // 从堆中取出当前节点（g值最小）
                if (!current) break;
                const { x, y, g } = current;
                if (g > costSoFar[x][y]) continue;

                const settlement = findSettlementAt(x, y);
                if (settlement && settlement.faction === u.faction && settlement.resource >= 5) {
                    const totalCost = g;
                    const supplyCost = (5 + Math.pow(1.01, totalCost)); // 计算需求量(单帧的需求量)
                    const demand = supplyCost * u._supplyCooldown; // 计算需求量(整段冷却时间内的需求量)
                    if (settlement.resource - settlement.reservedResource >= demand) { // 足够资源(考虑预约资源)
                        settlement.reservedResource += demand; // 预约资源
                        const path = [];
                        let px = x;
                        let py = y;
                        while (true) {
                            path.push({ x: px, y: py });
                            const prev = parent[px][py];
                            if (!prev) break;
                            px = prev.x;
                            py = prev.y;
                        }
                        path.reverse(); // 反转路径, 从目标到起点（这行真的需要吗？）

                        u._supplyPath = path;
                        u.supplyCost = supplyCost; // 记录需求量(单帧的需求量)
                        u.supplySettlement = settlement;
                        foundPath = true;
                        
                        if (!birthZone) u.birthSettlement = u.supplySettlement; // 有补给点了，设为空缺的出生点
                        break;
                    }
                }

                for (const offset of neighbors) {
                    const nx = x + offset.x;
                    const ny = y + offset.y;
                    if (nx < 0 || ny < 0 || nx >= SIZE || ny >= SIZE) continue;
                    if (unitOwner[nx][ny] !== u.faction) continue;

                    const newG = g + supplyStepCost(x, y, nx, ny); // 计算新路径成本
                    if (newG >= costSoFar[nx][ny]) continue;

                    costSoFar[nx][ny] = newG;
                    parent[nx][ny] = { x: x, y: y };
                    heap.push({ x: nx, y: ny, g: newG });
                }
            }

            if (!foundPath) { // 未找到路径
                u._supplyPath = null;
                u.supplyCost = 0;
                u.supplySettlement = null;
            }
        }
    }


    if (Array.isArray(u._supplyPath) && u._supplyPath.length > 0 && u.supplySettlement !== null && u.supplySettlement.resource >= u.supplyCost) { // 存在路径
        u.supplySettlement.resource -= u.supplyCost; // 减少资源
        u.supplySettlement.reservedResource -= u.supplyCost; // 收回预约资源
        u.health = Math.min(u.initialHealth, u.health + 0.5); // 增加生命值
        return true;
    }
    // 未找到路径
    if (birthZone) {
        u.morale -= 10 * (100 - u.morale) / 100;
        u.health -= 5 * (100 - u.health) / 100;
        // 没有出生点的单位对断补给免疫
    }
    return false;
}

function isPotentialFerry(x, y) { // 是否为潜在的河口
    if (riverMap[x][y] === 1) return 0;
    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
    let isFerry = 0;
    for (const dir of dirs) {
        const nx = x + dir.x;
        const ny = y + dir.y;
        if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && riverMap[nx][ny] === 1) {
            isFerry = 1;
            break;
        }
    }
    return isFerry;
}

function colonize(u) {
    const x = u.x;
    const y = u.y;
    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return false;
    if (findSettlementAt(x, y)) return false;

    const score = settlementScores[x] ? settlementScores[x][y] : 0;
    if (score < 10) return false;
    const newSettlement = {
        x,
        y,
        faction: u.faction,

        resource: 0,
        reservedResource: 0, // 已预约资源
        population: 10,
        techLevel: 1,
        lastCapturer: null,
        isDestroyed: false,
        parentX: null,
        parentY: null
    };
    settlements.push(newSettlement);
    settlementMap[x][y] = newSettlement;
    unitOwner[x][y] = u.faction;
    unitStrength[x][y] = u.health;

    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
    let isFerry = 0;
    for (const dir of dirs) {
        const nx = x + dir.x;
        const ny = y + dir.y;
        if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && riverMap[nx][ny] === 1) {
            isFerry = 1;
            break;
        }
    }
    if (ferryMap[x]) ferryMap[x][y] = isFerry;

    const last = u.lastCapturedSettlement;
    if (last && Number.isFinite(last.x) && Number.isFinite(last.y)) {
        buildRoadBetweenSettlements(last.x, last.y, x, y);
    }
    return true;
}

function attackByUnit(u) {
    const r = coverRadius(u);
    let target = null;
    for (const v of units) {
        if (v !== u && v.faction !== u.faction) {
            const dx = v.x - u.x;
            const dy = v.y - u.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= r) {
                if (!target || v.health > target.health) target = v;
            }
        }
    }
    for (const settlement of settlements) {
        if (settlement.faction === u.faction) continue;
        const dx = settlement.x - u.x;
        const dy = settlement.y - u.y;
        if (Math.sqrt(dx * dx + dy * dy) <= r) {
            settlement.resource = Math.max(0, settlement.resource - 0.5 * u.health);
        }
    }
    if (target) {
        target.health -= 0.01 * u.morale;
        u.capturedTiles = 0;
        //u.health -= 1;
        if(u.health > 0) emitWave(target.x, target.y, u.health, u);
    }
}

function getNewFaction(u, betrayProb) {
    let newFaction = Math.floor(Math.random() * COLORS.length) + 1;
    if (u.factionLastBetray > 0 && Math.random() < betrayProb) newFaction = u.factionLastBetray; // 有 betrayProb 概率背叛到上一个本阵营单位背叛的阵营，导致本阵营单位倾向于一起叛变
    return newFaction;
}

function updateMorale(u) {
    const r = coverRadius(u);
    const rInt = r;
    /*
    const d = nearestFriendlyDistance(u);
    if(d < 2)
        u.morale -= 0.5;
    if(d > 15 && d < SIZE)
        u.morale += 0.5;*/
    for (let dx = -rInt; dx <= rInt; dx++) {
        for (let dy = -rInt; dy <= rInt; dy++) {
            const nx = u.x + dx, ny = u.y + dy;
            if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= r) {
                if (unitOwner[nx][ny] !== u.faction) u.morale = Math.min(100, u.morale + 0.01);
            }
        }
    }
    const dis = waveDis && waveDis[u.x] ? waveDis[u.x][u.y] : Infinity;
    if (unitOwner[u.x][u.y] === u.faction) {
        if (Number.isFinite(dis) && dis > u.maxWaveDis) u.maxWaveDis = dis;  
        u.morale -= 0.000001 * u.maxWaveDis * u.maxWaveDis;
    }
    
    let birthZone = getActiveSettlement(u.birthSettlement);
    if(birthZone) {
        const popCap = getSettlementPopCap(birthZone);
        if(u.x == birthZone.x && u.y == birthZone.y && birthZone.population > popCap) {
            u.health += birthZone.population - popCap;
            birthZone.population = popCap;
            if(u.health > u.initialHealth) u.health = u.initialHealth;
        }
    }
    if (u.morale <= 0) {
        u.morale = 0;
        const prevFaction = u.faction;
        const newFaction = getNewFaction(u, 0.0);
        if (newFaction !== prevFaction) {
            u.faction = newFaction;
            //const betrayInfluenceMoraleType = (Math.random() > 0.01 * units.length) ? '振奋' : '崩溃';
	    //const betrayInfluenceMoraleType = (newFaction !== u.factionLastBetray) ? '无' : '崩溃';
            if(Math.random() < 0.002){ // 每个单位有0.2%的概率因为叛变引发黑天鹅事件
                for (const w of units) {
                    if (w !== u && w.faction === prevFaction) {
                        w.factionLastBetray = newFaction; // 其他单位收到本单位背叛到的阵营ID
                        const d = Math.abs(w.x - u.x) + Math.abs(w.y - u.y);
                        const decay = 60;
                        if(d > decay) continue;
                        w.morale = 100;
                        w.faction = getNewFaction(w, 0.0);// 黑天鹅事件: 有0%的概率背叛到上一个本阵营单位背叛的阵营——导致本阵营单位倾向于随机叛变，天下大乱
                        w.health = Math.max(u.health * 0.5, w.health);
                        w.betray = true;
                    }
                }

            }
            u.morale = 100;
            u.maxWaveDis = 0;// 重置最大波距离，因为本单位背叛到新的阵营
            u.birthSettlement = null; // 重置出生地，因为本单位背叛到新的阵营
            u.betray = true;
        }
    }
    if(u.morale > 100) u.morale = 100;
    /**
    if(u.betray) { // 本单位背叛到新的阵营，会自动占领附近的敌方定居点（仅占领人口大于人口上限的点，且仅执行一次）
        let newSettlement = null;
        for (const s of settlements) {
            const popCap = getSettlementPopCap(s);
            if (s.faction !== u.faction && s.population > popCap && (newSettlement && Math.abs(s.x - u.x) + Math.abs(s.y - u.y) <= Math.abs(newSettlement.x - u.x) + Math.abs(newSettlement.y - u.y) || newSettlement === null)) {
                newSettlement = s;
            }
        }
        if(newSettlement) { // 找到最近的敌方定居点
            newSettlement.faction = u.faction; 
        }
        u.betray = false;
    }
        **/
}

function updateSettlements() {
    const techSoftCap = 10;
    for (let i = 0; i < settlements.length; i++) {
        const settlement = settlements[i];
        settlement.resource += settlement.score * 0.2;

        const popCap = getSettlementPopCap(settlement);
        if (settlement.population < popCap) {
            settlement.population *= 1 + 0.05 * randomRange(0.8, 1.2); // 改大一点
        }
        else settlement.population -= 0.01 * (settlement.population - popCap);

        const currentTech = Math.max(1, Math.floor(settlement.techLevel || 1));
        let sameHNeighbors = 0;
        let lowerOneNeighbors = 0;
        for (let j = 0; j < settlements.length; j++) {
            if (i === j) continue;
            const other = settlements[j];
            const dist = Math.abs(other.x - settlement.x) + Math.abs(other.y - settlement.y);
            if (dist > 20) continue;
            if (other.techLevel === currentTech) sameHNeighbors++;
            if (other.techLevel === currentTech - 1) lowerOneNeighbors++;
        }
        if (sameHNeighbors >= 3 && currentTech < techSoftCap && Math.random() < 0.001) {
            settlement.techLevel = currentTech + 1;
        } else if (currentTech > 1 && lowerOneNeighbors < 3 && Math.random() < 0.001) {
            settlement.techLevel = currentTech - 1;
        } else {
            settlement.techLevel = currentTech;
        }

        const initialHealth = getInitialHealth(settlement);
        if (settlement.faction > 0 && settlement.population >= popCap && settlement.population >= initialHealth) {
            const superior = null;//settlement.lastCapturer && !settlement.lastCapturer.isDead ? settlement.lastCapturer : null;
            settlement.population = Math.max(1, settlement.population - initialHealth);
            units.push(new Unit(settlement.x, settlement.y, settlement.faction, superior, initialHealth, settlement.techLevel, settlement));
        }
        if(settlement.parentX !== null && settlement.parentY !== null) {
            const parent = findSettlementAt(settlement.parentX, settlement.parentY);
            if(parent) {
                if(parent.faction === settlement.faction) {

                }
                else { // 定居点叛变机制
                    let rand = Math.random();
                    if(rand < 0.7) {
                        settlement.faction = parent.faction; // 保持阵营一致
                        settlement.population = Math.max(1, settlement.population);
                    }
                    else if(rand < 0.85){
                        settlement.faction = Math.floor(Math.random() * COLORS.length) + 1; // 叛变到随机阵营
                        settlement.parentX = null;
                        settlement.parentY = null;
                        settlement.resource += parent.resource;
                        parent.resource = 0;
                    }
                    else { // 不变阵营，保持人口一致
                        settlement.parentX = null;
                        settlement.parentY = null;
                    }
                }
            }
            else {
                settlement.faction = Math.floor(Math.random() * COLORS.length) + 1; // 叛变到随机阵营
                settlement.parentX = null;
                settlement.parentY = null;
                settlement.population = Math.max(1, settlement.population);
            }
        }
    }
}

function updateUnits() {
    if (typeof Unit !== 'function') return;
    if (!Array.isArray(unitOwner) || unitOwner.length !== SIZE) {
        unitOwner = Array.from({ length: SIZE }, () => new Int16Array(SIZE).fill(-1));
        unitStrength = Array.from({ length: SIZE }, () => new Float32Array(SIZE).fill(0));
    }
    if (!Array.isArray(waveOwner) || waveOwner.length !== SIZE) {
        waveOwner = Array.from({ length: SIZE }, () => new Int16Array(SIZE).fill(-1));
        waveStrength = Array.from({ length: SIZE }, () => new Float32Array(SIZE).fill(0));
    }
    // 定居点先更新自身状态，再进入单位行为阶段
    updateSettlements();
    for (let i = 0; i < units.length; i++) {
        const u = units[i];
        syncWithSuperior(u);
        requestSupply(u);
        if (u.health <= 1) {
            u.isDead = true;
            units.splice(i, 1);
            i--;
            continue;
        }
        const move = chooseMove(u);
        u.x = move.x;
        u.y = move.y;

        paintByUnit(u);

        attackByUnit(u);
        updateMorale(u);
        //console.log(waveFrom);  

        const birthSettlement = getActiveSettlement(u.birthSettlement); // 出生点
        if (birthSettlement && u.health >= getInitialHealth(birthSettlement) && u.capturedTiles >= TILES_FOR_SETTLE * (isPotentialFerry(u.x, u.y) ? 0.9 : 1.1)) {
            if (colonize(u)) {
                u.health = 0;
            }
        }
        if (u.superior && !u.superior.isDead) {
            if(Math.abs(u.x - u.superior.x) + Math.abs(u.y - u.superior.y) > 50){
                u.superior = null;
            }
        }
        if (u.health <= 1) {
            u.isDead = true;
            units.splice(i, 1);
            i--;
        }
    }
    
    for (let x = 0; x < SIZE; x++) {
        for (let y = 0; y < SIZE; y++) {
            if (unitStrength[x][y] > 0 && !findSettlementAt(x, y)) {
                unitStrength[x][y] = Math.max(0, unitStrength[x][y] - STRENGTH_DECAY * heightMap[x][y] * 15);
                if (unitStrength[x][y] === 0) unitOwner[x][y] = -1;
            }
        }
    }
    propagateWaves();
    updateLeaderboards();
}

function drawUnitOverlay(ctx) {
    ctx.save();
    ctx.globalAlpha = 0.8;
    if (!Array.isArray(unitOwner) || unitOwner.length !== SIZE) {
        ctx.restore();
        return;
    }
    for (let x = 0; x < SIZE; x++) {
        const row = unitOwner[x];
        if (!row) continue;
        for (let y = 0; y < SIZE; y++) {
            const fid = row[y];
            if (fid > 0 && riverMap[x][y] === 0) {
                const strength = unitStrength[x][y] || 0;
                const alpha = Math.max(0, Math.min(0.8, Math.log2(strength + 1) * 0.2));
                ctx.globalAlpha = alpha;
                ctx.fillStyle = COLORS[(fid - 1) % COLORS.length];
                ctx.fillRect(x * SCALE_FACTOR, y * SCALE_FACTOR, SCALE_FACTOR, SCALE_FACTOR);
            }
        }
    }
    ctx.restore();
}
function emitWave(x, y, intensity, self) {
    const cur = waveStrength[x][y] || 0;
    const fid = unitOwner[x][y];
    if (intensity > cur && unitOwner[x][y] === fid && !riverMap[x][y]) { // 只允许己方单位在己方领土发射波
        waveSources.push({ x, y, intensity, faction: fid, from: self });
    }
}
function spreadCost(nx, ny, x, y) {
    const dh = Math.max(0, heightMap[nx][ny] - heightMap[x][y]);
    const curRiver = riverMap[x][y] === 1;
    const nextRiver = riverMap[nx][ny] === 1;
    let cost = 100;
    if (curRiver !== nextRiver) {
        const ferry = (ferryMap[x] && ferryMap[x][y] === 1) || (ferryMap[nx] && ferryMap[nx][ny] === 1);
        if(ferry) cost = 1; // 河流-非河流成本
        else cost = 200;
    } else if (nextRiver) {
        cost = 0.5; // 跨河流成本
    } else {
        cost += dh * 10; // 非河流区域，高度差成本
        const roadHere = (road[x] && road[x][y] === 1) || (road[nx] && road[nx][ny] === 1); // 有道路
        if(roadHere) cost = 1;
    }
    return cost;
}

function propagateWaves() {
    if (!Array.isArray(unitOwner) || unitOwner.length !== SIZE) return;
    if (!Array.isArray(waveDis) || waveDis.length !== SIZE) {
        waveDis = Array.from({ length: SIZE }, () => new Float32Array(SIZE));
    }
    if (!Array.isArray(waveFrom) || waveFrom.length !== SIZE) {
        waveFrom = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    }
    for (let x = 0; x < SIZE; x++) {
        const row = waveDis[x];
        for (let y = 0; y < SIZE; y++) {
            row[y] = Infinity;
        }
    }
    for (let x = 0; x < SIZE; x++) {
        for (let y = 0; y < SIZE; y++) {
            waveStrength[x][y] -= WAVE_DECAY;
            if (waveStrength[x][y] <= WAVE_FADE_THRESHOLD) {
                waveOwner[x][y] = -1;
                waveStrength[x][y] = 0;
            }
        }
    }
    const queue = [];
    let head = 0;
    for (const src of waveSources) {
        const { x, y, intensity, faction, from } = src;
        if (unitOwner[x][y] !== faction) continue;
        if (intensity > waveStrength[x][y]) { 
            waveStrength[x][y] = intensity;
            waveOwner[x][y] = faction;
            waveDis[x][y] = 0;
            waveFrom[x][y] = from;
            //console.log(from);
            queue.push({ x, y });
        }
    }
    while (head < queue.length) {
        const cur = queue[head++];
        const s = waveStrength[cur.x][cur.y];
        const f = waveOwner[cur.x][cur.y];
        const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
        for (const d of dirs) {
            const nx = cur.x + d.x, ny = cur.y + d.y;
            if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue;
            if (unitOwner[nx][ny] !== f) continue;
            const ns = s - spreadCost(nx, ny, cur.x, cur.y);
            const nd = waveDis[cur.x][cur.y] + 1;
            if (ns > waveStrength[nx][ny]) {
                waveStrength[nx][ny] = ns;
                waveOwner[nx][ny] = f;
                waveDis[nx][ny] = nd;
                waveFrom[nx][ny] = waveFrom[cur.x][cur.y]; // 记录来源
                if (ns > 1) queue.push({ x: nx, y: ny });
            }
        }
    }
    waveSources = [];
}

function renderLeaderboard(containerId, arr) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = arr.map(item => {
        const color = COLORS[(item.id - 1) % COLORS.length];
        return `<div style="display:flex;align-items:center;gap:6px;">
            <span style="width:12px;height:12px;background:${color};display:inline-block;border:1px solid #000"></span>
            <span>${getFactionDisplayName(item.id)}</span>
            <span style="margin-left:auto">${item.count}</span>
        </div>`;
    }).join('');
}

function updateLeaderboards() {
    const unitCounts = new Map();
    for (const u of units) {
        unitCounts.set(u.faction, (unitCounts.get(u.faction) || 0) + 1);
    }
    const cellCounts = new Map();
    if (Array.isArray(unitOwner) && unitOwner.length === SIZE) {
        for (let x = 0; x < SIZE; x++) {
            const row = unitOwner[x];
            for (let y = 0; y < SIZE; y++) {
                const f = row[y];
                if (f > 0) cellCounts.set(f, (cellCounts.get(f) || 0) + 1);
            }
        }
    }
    const ids = factions.map(f => f.id).filter(id => id > 0);
    const unitSorted = ids.map(id => ({ id, count: unitCounts.get(id) || 0 })).sort((a, b) => b.count - a.count);
    const cellSorted = ids.map(id => ({ id, count: cellCounts.get(id) || 0 })).sort((a, b) => b.count - a.count);
    renderLeaderboard('unitLeaderboard', unitSorted);
    renderLeaderboard('cellLeaderboard', cellSorted);
}

function unitLoop() {
    updateUnits();
    if (territoryLabelFrameCounter % FACTION_LABEL_UPDATE_INTERVAL === 0) {
        updateTerritoryLabels();
    }
    drawMap();
    territoryLabelFrameCounter += 1;
    worldTime += 1;
    simulationTimer = requestAnimationFrame(unitLoop);
}

function startUnitSimulation() {
    initFactions();
    units = [];
    worldTime = 0;
    territoryLabelFrameCounter = 0;
    factionAreas = [];
    cancelAnimationFrame(simulationTimer);
    waveOwner = Array.from({ length: SIZE }, () => new Int16Array(SIZE).fill(-1));
    waveStrength = Array.from({ length: SIZE }, () => new Float32Array(SIZE).fill(0));
    waveSources = [];
    simulationTimer = requestAnimationFrame(unitLoop);
}
function toggleUnitPositions() {
    showUnitPositions = !showUnitPositions;
    const btn = document.getElementById('toggleUnitsBtn');
    if (btn) btn.textContent = showUnitPositions ? '隐藏单位位置' : '显示单位位置';
}
function toggleRoads() {
    showRoads = !showRoads;
    const btn = document.getElementById('toggleRoadsBtn');
    if (btn) btn.textContent = showRoads ? '隐藏道路' : '显示道路';
    drawMap();
}
function toggleParentArrows() {
    showParentArrows = !showParentArrows;
    const btn = document.getElementById('toggleParentArrowsBtn');
    if (btn) btn.textContent = showParentArrows ? '隐藏父‑子箭头' : '显示父‑子箭头';
    drawMap();
}
function drawCommandLines(ctx) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 255, 255, 1)'; // 透明度
    ctx.lineWidth = 0.5;
    for (const u of units) {
        if (!u.superior || u.superior.isDead) continue;
        const x1 = u.x * SCALE_FACTOR + SCALE_FACTOR / 2;
        const y1 = u.y * SCALE_FACTOR + SCALE_FACTOR / 2;
        const x2 = u.superior.x * SCALE_FACTOR + SCALE_FACTOR / 2;
        const y2 = u.superior.y * SCALE_FACTOR + SCALE_FACTOR / 2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }
    ctx.restore();
}
function drawSupplyLines(ctx) {
    ctx.save();
    ctx.lineWidth = Math.max(1, SCALE_FACTOR * 0.35);
    for (const u of units) {
        if (!Array.isArray(u._supplyPath) || u._supplyPath.length < 2) continue;
        const color = COLORS[(u.faction - 1) % COLORS.length];
        ctx.strokeStyle = color;
        ctx.beginPath();
        for (let i = 0; i < u._supplyPath.length; i++) {
            const p = u._supplyPath[i];
            const px = p.x * SCALE_FACTOR + SCALE_FACTOR / 2;
            const py = p.y * SCALE_FACTOR + SCALE_FACTOR / 2;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
    }
    ctx.restore();
}
function drawUnitPositions(ctx) {
    drawCommandLines(ctx);
    drawSupplyLines(ctx);
    for (const u of units) {
        const color = COLORS[(u.faction - 1) % COLORS.length];
        ctx.fillStyle = color;
        ctx.strokeStyle = '#000';
        const r = Math.max(2, Math.floor(SCALE_FACTOR / 3));
        const cx = u.x * SCALE_FACTOR + SCALE_FACTOR / 2;
        const cy = u.y * SCALE_FACTOR + SCALE_FACTOR / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }
}
